<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NUVÉ | 2026 Archive</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
:root {
  --bg: #0a0a0a;
  --bg-glass: rgba(255, 255, 255, 0.03);
  --bg-glass-alt: rgba(255, 255, 255, 0.06);
  --ink-primary: #f8f8f8;
  --ink-secondary: #a8a8a8;
  --ink-muted: #666;
  --accent-gold: #d4af37;
  --accent-gold-dim: #b8942f;
  --border-glass: rgba(255, 255, 255, 0.08);
  --shadow-1: 0 8px 32px rgba(0,0,0,0.4);
  --shadow-2: 0 20px 60px rgba(0,0,0,0.5);
  --gradient-gold: linear-gradient(135deg, #d4af37 0%, #b8942f 50%, #d4af37 100%);
}

* { margin: 0; padding: 0; box-sizing: border-box; }
html { scroll-behavior: smooth; }
body { 
  font-family: 'Inter', sans-serif; 
  background: var(--bg); 
  color: var(--ink-primary); 
  overflow-x: hidden; 
  line-height: 1.7;
}

/* ARCHITECTURAL HEADER */
.header-container {
  position: fixed; top: 0; width: 100%; z-index: 1000; 
  padding: 1.5rem 5%; backdrop-filter: blur(25px);
  background: rgba(10, 10, 10, 0.95); border-bottom: 1px solid var(--border-glass);
  transition: all 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
}
header { max-width: 1400px; margin: 0 auto; display: flex; align-items: center; justify-content: space-between; height: 70px; }
.logo { 
  font-family: 'Cormorant Garamond', serif; font-size: clamp(1.5rem, 4vw, 2.2rem); 
  font-weight: 300; letter-spacing: 0.1em; background: var(--gradient-gold); 
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
  cursor: pointer; transition: all 0.3s ease;
}
.logo:hover { transform: scale(1.05); }
.nav-links { display: flex; gap: 2.5rem; align-items: center; }
.nav-btn { 
  font-size: 0.85rem; font-weight: 400; color: var(--ink-secondary); text-transform: uppercase; 
  letter-spacing: 0.08em; border: none; background: none; cursor: pointer; position: relative;
  transition: all 0.3s ease; padding: 0.5rem 0;
}
.nav-btn::after {
  content: ''; position: absolute; bottom: 0; left: 0; width: 0; height: 1px; 
  background: var(--gradient-gold); transition: width 0.3s ease;
}
.nav-btn:hover::after, .nav-btn.active::after { width: 100%; }
.nav-btn:hover, .nav-btn.active { color: var(--accent-gold); }
.header-actions { display: flex; align-items: center; gap: 1.5rem; }
.user-chip { font-size: 0.75rem; color: var(--ink-secondary); letter-spacing: 0.05em; font-weight: 400; }
.cart-btn { 
  position: relative; display: flex; align-items: center; gap: 0.5rem; 
  color: var(--ink-secondary); background: none; border: none; font-size: 0.85rem; 
  cursor: pointer; transition: all 0.3s ease;
}
.cart-badge { background: var(--accent-gold); color: var(--bg); border-radius: 50%; width: 20px; height: 20px; 
  display: flex; align-items: center; justify-content: center; font-size: 0.7rem; font-weight: 500;
}

/* HERO */
.hero { height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; 
  text-align: center; padding: 0 5%; position: relative; overflow: hidden;
}
.hero::before {
  content: ''; position: absolute; top: 0; left: 0; right: 0; bottom: 0;
  background: radial-gradient(circle at 20% 80%, rgba(212, 191, 55, 0.1) 0%, transparent 50%),
              radial-gradient(circle at 80% 20%, rgba(212, 191, 55, 0.08) 0%, transparent 50%);
  pointer-events: none; z-index: 1;
}
.hero-content { max-width: 900px; position: relative; z-index: 2; }
.hero h1 { 
  font-family: 'Cormorant Garamond', serif; font-size: clamp(4.5rem, 12vw, 11rem); 
  font-weight: 300; line-height: 0.85; letter-spacing: -0.03em; margin-bottom: 2rem;
  opacity: 0; transform: translateY(60px); animation: heroReveal 1.8s 0.3s ease forwards;
}
.hero h1 em { 
  background: var(--gradient-gold); -webkit-background-clip: text; -webkit-text-fill-color: transparent; 
  background-clip: text; position: relative;
}
.hero-p { 
  font-size: 1.2rem; color: var(--ink-secondary); max-width: 500px; margin: 0 auto 4rem; 
  letter-spacing: 0.02em; opacity: 0; animation: heroReveal 1.8s 0.8s ease forwards; line-height: 1.8;
}
.add-btn { 
  display: inline-flex; align-items: center; gap: 1rem; padding: 1.2rem 3rem; 
  background: var(--bg-glass-alt); backdrop-filter: blur(20px); border: 1px solid var(--border-glass);
  color: var(--ink-primary); font-size: 0.9rem; font-weight: 400; text-transform: uppercase; 
  letter-spacing: 0.1em; cursor: pointer; transition: all 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
  position: relative; overflow: hidden; opacity: 0; transform: translateY(40px); 
  animation: heroReveal 1.8s 1.2s ease forwards;
}
.add-btn::before {
  content: ''; position: absolute; top: 0; left: -100%; width: 100%; height: 100%;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent); transition: left 0.6s;
}
.add-btn:hover::before { left: 100%; }
.add-btn:hover { border-color: var(--accent-gold); transform: translateY(-4px); box-shadow: var(--shadow-2); }

/* SHOP */
.shop-wrap { padding: 20vh 5%; max-width: 1600px; margin: 0 auto; }
.grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(420px, 1fr)); gap: 4rem 3rem; }
.card { 
  background: var(--bg-glass); backdrop-filter: blur(20px); border: 1px solid var(--border-glass); 
  border-radius: 8px; overflow: hidden; transition: all 0.6s cubic-bezier(0.25, 0.46, 0.45, 0.94);
  cursor: pointer; position: relative; opacity: 0; transform: translateY(60px);
}
.card.animate { opacity: 1; transform: translateY(0); }
.card:hover { 
  transform: translateY(-20px) scale(1.02); border-color: var(--accent-gold); box-shadow: var(--shadow-2);
}
.card-img { 
  height: 500px; background: linear-gradient(135deg, var(--bg-glass-alt), var(--bg-glass)); 
  display: flex; align-items: center; justify-content: center; font-size: 5rem; transition: all 0.6s ease; 
  position: relative; overflow: hidden;
}
.card:hover .card-img { background: var(--gradient-gold); }
.card-img i { transition: all 0.4s ease; }
.card:hover .card-img i { transform: scale(1.2) rotate(5deg); text-shadow: 0 0 30px rgba(212, 191, 55, 0.5); }
.card-name { 
  font-family: 'Cormorant Garamond', serif; font-size: 1.8rem; font-weight: 300; 
  margin: 2.5rem; letter-spacing: -0.01em;
}
.card-price { font-size: 1.1rem; font-weight: 500; color: var(--accent-gold); margin: 0 2.5rem 2rem; }
.add-btn { 
  margin: 0 2.5rem 2.5rem; padding: 1rem 2rem; background: transparent; border: 1px solid var(--border-glass);
  color: var(--ink-primary); text-transform: uppercase; font-size: 0.8rem; letter-spacing: 0.1em; 
  font-weight: 400; cursor: pointer; transition: all 0.3s ease; position: relative; overflow: hidden; width: calc(100% - 5rem);
}
.add-btn:hover { background: var(--accent-gold); color: var(--bg); transform: translateY(-2px); }

/* CART & ORDERS */
.cart-wrap, .orders-wrap { padding: 20vh 5%; max-width: 1000px; margin: 0 auto; }
.page-title { 
  font-family: 'Cormorant Garamond', serif; font-size: clamp(3.5rem, 10vw, 6rem); 
  text-align: center; margin-bottom: 4rem;
}
.cart-item { 
  display: flex; justify-content: space-between; align-items: center; padding: 2.5rem; 
  background: var(--bg-glass-alt); border: 1px solid var(--border-glass); border-radius: 8px; 
  margin-bottom: 1.5rem; transition: all 0.3s ease;
}
.cart-item:hover { border-color: var(--accent-gold); transform: translateX(8px); }
.cart-total { 
  background: var(--bg-glass); backdrop-filter: blur(20px); border: 1px solid var(--border-glass); 
  padding: 3rem; border-radius: 8px; text-align: center; margin-top: 3rem;
}
.checkout-btn { 
  width: 100%; padding: 1.5rem; background: var(--gradient-gold); color: var(--bg); border: none; 
  font-size: 1rem; font-weight: 500; text-transform: uppercase; letter-spacing: 0.1em; 
  cursor: pointer; transition: all 0.3s ease; border-radius: 4px;
}
.checkout-btn:hover { transform: scale(1.02); box-shadow: var(--shadow-2); }

/* MODALS */
.overlay { 
  position: fixed; inset: 0; background: rgba(0,0,0,0.85); backdrop-filter: blur(15px); z-index: 2000; 
  display: none; align-items: center; justify-content: center; padding: 2rem;
}
.overlay.open { display: flex; animation: overlayFadeIn 0.4s ease; }
.modal { 
  background: var(--bg-glass-alt); backdrop-filter: blur(30px); border: 1px solid var(--border-glass); 
  border-radius: 16px; width: min(90vw, 500px); padding: 3rem; max-height: 90vh; overflow-y: auto;
}
.modal-title { font-family: 'Cormorant Garamond', serif; font-size: 2.2rem; margin-bottom: 2rem; text-align: center; }
.form-input { 
  width: 100%; padding: 1.2rem 1.5rem; background: var(--bg-glass); border: 1px solid var(--border-glass); 
  color: var(--ink-primary); font-size: 1rem; margin-bottom: 1.5rem; border-radius: 8px; transition: all 0.3s ease;
}
.form-input:focus { outline: none; border-color: var(--accent-gold); box-shadow: 0 0 0 3px rgba(212, 191, 55, 0.1); }
.modal-btn { 
  width: 100%; padding: 1.2rem; background: var(--gradient-gold); color: var(--bg); border: none; 
  font-size: 0.95rem; font-weight: 500; text-transform: uppercase; letter-spacing: 0.08em; 
  cursor: pointer; border-radius: 8px; transition: all 0.3s ease;
}
.modal-btn:hover { transform: translateY(-2px); box-shadow: var(--shadow-1); }
.toggle-btn { margin-top: 1rem; font-size: 0.75rem; opacity: 0.7; color: var(--ink-secondary); width: 100%; }

/* NOTIFICATION */
.notif { 
  position: fixed; bottom: 3rem; right: 3rem; background: var(--gradient-gold); color: var(--bg); 
  padding: 1.2rem 2rem; font-size: 0.85rem; font-weight: 500; text-transform: uppercase; 
  letter-spacing: 0.08em; border-radius: 50px; transform: translateX(400px); 
  transition: all 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94); z-index: 3000; box-shadow: var(--shadow-2);
}
.notif.show { transform: translateX(0); }

/* ADMIN PANEL */
#admin { display: none; min-height: 100vh; background: var(--bg); flex-direction: column; }
#admin.active { display: flex; }
.adm-header { 
  background: rgba(10, 10, 10, 0.95); backdrop-filter: blur(25px); border-bottom: 1px solid var(--border-glass);
  padding: 0 5%; height: 80px; display: flex; align-items: center; justify-content: space-between;
}
.adm-body { display: flex; flex: 1; }
.adm-sidebar { 
  width: 280px; background: var(--bg-glass); backdrop-filter: blur(20px); border-right: 1px solid var(--border-glass); 
  padding: 3rem 0;
}
.adm-nav-btn { 
  display: block; width: 100%; padding: 1.5rem 2.5rem; color: var(--ink-secondary); 
  font-size: 0.85rem; font-weight: 400; text-transform: uppercase; letter-spacing: 0.08em; 
  border: none; background: none; border-left: 3px solid transparent; transition: all 0.3s ease; cursor: pointer;
}
.adm-nav-btn:hover, .adm-nav-btn.active {
  color: var(--accent-gold); border-left-color: var(--accent-gold); background: rgba(212, 191, 55, 0.1);
}
.adm-main { flex: 1; padding: 4rem; overflow-y: auto; }
#statGrid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 2rem; margin-bottom: 3rem; }
.stat-card { 
  background: var(--bg-glass-alt); backdrop-filter: blur(20px); border: 1px solid var(--border-glass); 
  padding: 2rem; border-radius: 12px; text-align: center; transition: all 0.3s ease;
}
.stat-card:hover { border-color: var(--accent-gold); transform: translateY(-4px); }
.stat-number { font-size: 2.5rem; font-weight: 300; color: var(--accent-gold); font-family: 'Cormorant Garamond', serif; }
.stat-label { font-size: 0.85rem; color: var(--ink-muted); text-transform: uppercase; letter-spacing: 0.08em; margin-top: 0.5rem; }
.admin-table { width: 100%; border-collapse: collapse; margin-top: 2rem; }
.admin-table th, .admin-table td { padding: 1.5rem; text-align: left; border-bottom: 1px solid var(--border-glass); }
.admin-table th { font-size: 0.85rem; color: var(--ink-muted); text-transform: uppercase; letter-spacing: 0.08em; }

/* ANIMATIONS */
@keyframes heroReveal { to { opacity: 1; transform: translateY(0); } }
@keyframes overlayFadeIn { from { opacity: 0; } to { opacity: 1; } }
.page { display: none; }
.page.active { display: block; animation: fadeInUp 0.8s ease; }
@keyframes fadeInUp { from { opacity: 0; transform: translateY(40px); } to { opacity: 1; transform: translateY(0); } }

@media (max-width: 768px) {
  .header-container { padding: 1rem 4%; }
  .nav-links { gap: 1.5rem; }
  .grid { grid-template-columns: 1fr; gap: 2rem; }
  .hero h1 { font-size: 4rem; }
}
</style>
</head>
<body>

<div id="site">
  <!-- YOUR ORIGINAL HEADER STRUCTURE -->
  <div class="header-container">
    <header id="site-header">
      <div class="logo" onclick="nav('home')">NUVÉ</div>
      <nav class="nav-links">
        <button class="nav-btn active" onclick="nav('home')">Archive</button>
        <button class="nav-btn" onclick="nav('shop')">Collection</button>
        <button class="nav-btn" onclick="nav('orders')">Orders</button>
      </nav>
      <div class="header-actions">
        <span id="userChip" class="userChip"></span>
        <button class="nav-btn" id="authBtn" onclick="openAuth()">Login</button>
        <button class="cart-btn" onclick="nav('cart')" style="opacity:1;">
          Bag [<span id="cartBadge">0</span>]
        </button>
      </div>
    </header>
  </div>

  <!-- YOUR ORIGINAL PAGES -->
  <div id="home" class="page active">
    <div class="hero">
      <div class="hero-content">
        <h1>The<br>New <em>Standard</em></h1>
        <p class="hero-p">Architectural silhouettes for the modern observer. A modular study of structure and silence.</p>
        <button class="add-btn" onclick="nav('shop')">Enter Archive</button>
      </div>
    </div>
  </div>

  <div id="shop" class="page">
    <div class="shop-wrap">
      <div class="grid" id="prodGrid"></div>
    </div>
  </div>

  <div id="cart" class="page">
    <div class="cart-wrap">
      <h2 class="page-title">The Bag</h2>
      <div id="cartItems"></div>
      <div id="cartSum"></div>
    </div>
  </div>

  <div id="orders" class="page">
    <div class="orders-wrap">
      <h2 class="page-title">Orders</h2>
      <div id="ordersList"></div>
    </div>
  </div>
</div>

<!-- YOUR ORIGINAL ADMIN PANEL -->
<div id="admin">
  <header class="adm-header">
    <div class="logo" style="font-size:1.2rem;">NUVÉ ADMIN</div>
    <button onclick="logout()" style="color:#666; font-size:0.6rem; letter-spacing:0.2em;">EXIT</button>
  </header>
  <div class="adm-body">
    <nav class="adm-sidebar">
      <button class="adm-nav-btn active" onclick="admNav('overview')">Overview</button>
      <button class="adm-nav-btn" onclick="admNav('orders-admin')">Orders</button>
      <button class="adm-nav-btn" onclick="admNav('products-admin')">Inventory</button>
    </nav>
    <main class="adm-main">
      <div id="overview" class="page active">
        <div id="statGrid" class="grid"></div>
        <table class="admin-table"><thead><tr><th>ID</th><th>Customer</th><th>Total</th><th>Status</th></tr></thead><tbody id="recentOrdersTbl"></tbody></table>
      </div>
      <div id="orders-admin" class="page" style="display:none;">
        <table class="admin-table"><thead><tr><th>ID</th><th>Customer</th><th>Total</th><th>Status</th><th>Actions</th></tr></thead><tbody id="adminOrdersTbl"></tbody></table>
      </div>
      <div id="products-admin" class="page" style="display:none;">
        <div id="adminProdTbl"></div>
      </div>
    </main>
  </div>
</div>

<!-- YOUR ORIGINAL MODAL -->
<div class="overlay" id="authOverlay">
  <div class="modal">
    <h3 id="modalTitle" class="modal-title">Access</h3>
    <input id="aEmail" class="form-input" placeholder="EMAIL">
    <input id="aPass" type="password" class="form-input" placeholder="PASSWORD">
    <div id="nameGroup" style="display:none;">
      <input id="aName" class="form-input" placeholder="NAME">
    </div>
    <button class="modal-btn" onclick="submitAuth()">CONTINUE</button>
    <button class="toggle-btn" onclick="toggleMode()">TOGGLE JOIN/LOGIN</button>
  </div>
</div>

<div class="notif" id="notif"></div>

<!-- YOUR ORIGINAL JAVASCRIPT - FULLY PRESERVED -->
<script>
const API = ''; 
let token = localStorage.getItem('nuve_token');
let me = JSON.parse(localStorage.getItem('nuve_me') || 'null');
let cart = JSON.parse(localStorage.getItem('nuve_cart') || '[]');
let authMode = 'signin';

async function api(path, opts={}) {
  const headers = { 'Content-Type':'application/json', ...(token ? { Authorization:`Bearer ${token}` } : {}) };
  const r = await fetch(`/api${path}`, { headers, ...opts, body: opts.body ? JSON.stringify(opts.body) : undefined });
  const data = await r.json();
  if (!r.ok) throw new Error(data.error || r.statusText);
  return data;
}

function nav(id) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  document.querySelectorAll('#site-header .nav-btn').forEach(btn => btn.classList.remove('active'));
  document.querySelector(`#site-header [onclick="nav('${id}')"]`)?.classList.add('active');
  
  if(id === 'shop') loadProducts();
  if(id === 'cart') renderCart();
  if(id === 'orders') loadMyOrders();
}

async function loadProducts() {
  try {
    const data = await api('/products');
    document.getElementById('prodGrid').innerHTML = data.products.map(p => `
      <div class="card">
        <div class="card-img"><i class="fas fa-${p.emoji?.replace('🧥', 'shirt') || 'shirt'}"></i></div>
        <div class="card-name">${p.name}</div>
        <div class="card-price">$${p.price}</div>
        <button class="add-btn" onclick="addCart('${p.id}','${p.name}',${p.price},'${p.emoji}')">Add to Bag</button>
      </div>
    `).join('');
    // Animate new cards
    setTimeout(() => {
      document.querySelectorAll('.card').forEach((card, i) => {
        setTimeout(() => card.classList.add('animate'), i * 100);
      });
    }, 100);
  } catch(e) { console.error(e); }
}

function addCart(id, name, price, emoji) {
  const item = cart.find(i => i.id === id);
  if(item) item.qty++; else cart.push({id, name, price, emoji, qty:1});
  localStorage.setItem('nuve_cart', JSON.stringify(cart));
  document.getElementById('cartBadge').textContent = cart.reduce((a,b)=>a+b.qty,0);
  toast('Added to Archive');
}

function renderCart() {
  const el = document.getElementById('cartItems');
  el.innerHTML = cart.map(i => `
    <div class="cart-item">
      <div style="display:flex;align-items:center;gap:1rem;">
        <i class="fas fa-${i.emoji?.replace('🧥', 'shirt') || 'shirt'}" style="font-size:2rem;color:var(--accent-gold);"></i>
        <div>${i.name} - Qty: ${i.qty}</div>
      </div>
      <div style="font-weight:500;">$${(i.price*i.qty).toFixed(2)}</div>
    </div>
  `).join('') || '<p style="text-align:center;color:var(--ink-muted);">Archive empty</p>';
  
  const total = cart.reduce((a,b)=>a+(b.price*b.qty),0);
  document.getElementById('cartSum').innerHTML = `
    <div class="cart-total">
      <div style="font-size:1.5rem;font-weight:500;margin-bottom:2rem;color:var(--accent-gold);">Total: $${total.toFixed(2)}</div>
      <button class="checkout-btn" onclick="checkout()">Checkout</button>
    </div>
  `;
}

async function checkout() {
  if(!me) return openAuth();
  await api('/orders', { method:'POST', body:{ items: cart.map(i=>({productId:i.id, quantity:i.qty})) } });
  cart=[]; localStorage.setItem('nuve_cart','[]'); nav('orders'); toast('Order Placed');
}

async function loadMyOrders() {
  const data = await api('/orders');
  document.getElementById('ordersList').innerHTML = data.orders.map(o => `
    <div style="padding:2.5rem;background:var(--bg-glass-alt);border:1px solid var(--border-glass);border-radius:8px;margin-bottom:1.5rem;transition:all 0.3s ease;">
      Order #${o.id.slice(0,8)} - <span style="color:var(--accent-gold);font-weight:500;">${o.status}</span>
    </div>
  `).join('');
}

function openAuth() { document.getElementById('authOverlay').classList.add('open'); }
function closeAuth() { document.getElementById('authOverlay').classList.remove('open'); }
function toggleMode() { 
  authMode = (authMode === 'signin' ? 'register' : 'signin'); 
  document.getElementById('nameGroup').style.display = (authMode === 'register' ? 'block' : 'none');
  document.getElementById('modalTitle').textContent = authMode === 'signin' ? 'Access' : 'Join NUVÉ';
}

async function submitAuth() {
  const email = document.getElementById('aEmail').value;
  const password = document.getElementById('aPass').value;
  const name = document.getElementById('aName').value;
  const data = await api(`/auth/${authMode}`, { method:'POST', body: { email, password, name } });
  localStorage.setItem('nuve_token', data.token);
  localStorage.setItem('nuve_me', JSON.stringify(data.user));
  location.reload();
}

function toast(msg) { 
  const n = document.getElementById('notif'); 
  n.textContent = msg; 
  n.classList.add('show'); 
  setTimeout(() => n.classList.remove('show'), 3000); 
}

function logout() { localStorage.clear(); location.reload(); }

// ADMIN FUNCTIONS - YOUR ORIGINAL CODE
function admNav(id) {
  document.querySelectorAll('#admin .page').forEach(p => p.style.display = 'none');
  document.querySelectorAll('.adm-nav-btn').forEach(btn => btn.classList.remove('active'));
  document.getElementById(id).style.display = 'block';
  document.querySelector(`[onclick="admNav('${id}')"]`).classList.add('active');
}

// INIT - YOUR ORIGINAL LOGIC
if(me) {
  document.getElementById('userChip').textContent = me.name.toUpperCase();
  document.getElementById('authBtn').textContent = 'Account';
}
if(me && me.role === 'admin') {
  document.getElementById('site').style.display = 'none';
  document.getElementById('admin').classList.add('active');
} else if (document.getElementById('shop').classList.contains('active')) {
  loadProducts();
}

// Enhanced interactions
document.getElementById('authOverlay').addEventListener('click', (e) => {
  if (e.target.classList.contains('overlay')) closeAuth();
});
window.addEventListener('scroll', () => {
  const header = document.querySelector('.header-container');
  if (window.scrollY > 100) {
    header.style.background = 'rgba(10, 10, 10, 0.98)';
    header.style.backdropFilter = 'blur(30px)';
  } else {
    header.style.background = 'rgba(10, 10, 10, 0.95)';
    header.style.backdropFilter = 'blur(25px)';
  }
});
</script>
</body>
</html>
