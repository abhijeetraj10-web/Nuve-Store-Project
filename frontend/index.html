<style>
:root {
  --bg: #0a0a0a;
  --bg-glass: rgba(255, 255, 255, 0.03);
  --bg-glass-alt: rgba(255, 255, 255, 0.06);
  --ink-primary: #f8f8f8;
  --ink-secondary: #a8a8a8;
  --ink-muted: #666;
  --accent-gold: #d4af37;
  --accent-gold-dim: #b8942f;
  --border-glass: rgba(255, 255, 255, 0.08);
  --shadow-1: 0 8px 32px rgba(0,0,0,0.4);
  --shadow-2: 0 20px 60px rgba(0,0,0,0.5);
  --gradient-gold: linear-gradient(135deg, #d4af37 0%, #b8942f 50%, #d4af37 100%);
}

* { margin: 0; padding: 0; box-sizing: border-box; }
html { scroll-behavior: smooth; }
body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--ink-primary); overflow-x: hidden; line-height: 1.7; }

/* HEADER */
.header-container {
  position: fixed;
  top: 0;
  width: 100%;
  z-index: 1000;
  padding: 1.5rem 5%;
  backdrop-filter: blur(25px);
  background: rgba(10, 10, 10, 0.95);
  border-bottom: 1px solid var(--border-glass);
  transition: all 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
}

header {
  max-width: 1400px;
  margin: 0 auto;
  display: flex;
  align-items: center;
  justify-content: space-between;
  height: 70px;
}

.logo {
  font-family: 'Cormorant Garamond', serif;
  font-size: clamp(1.5rem, 4vw, 2.2rem);
  font-weight: 300;
  letter-spacing: 0.1em;
  background: var(--gradient-gold);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  cursor: pointer;
  transition: all 0.3s ease;
}

.logo:hover { transform: scale(1.05); }

.nav-links { display: flex; gap: 2.5rem; align-items: center; }

.nav-btn {
  font-size: 0.85rem;
  font-weight: 400;
  color: var(--ink-secondary);
  text-transform: uppercase;
  letter-spacing: 0.08em;
  border: none;
  background: none;
  cursor: pointer;
  position: relative;
  transition: all 0.3s ease;
  padding: 0.5rem 0;
}

.nav-btn::after {
  content: '';
  position: absolute;
  bottom: 0;
  left: 0;
  width: 0;
  height: 1px;
  background: var(--gradient-gold);
  transition: width 0.3s ease;
}

.nav-btn:hover::after,
.nav-btn.active::after { width: 100%; }

.nav-btn:hover,
.nav-btn.active { color: var(--accent-gold); }

.header-actions { display: flex; align-items: center; gap: 1.5rem; }

.user-chip {
  font-size: 0.75rem;
  color: var(--ink-secondary);
  letter-spacing: 0.05em;
  font-weight: 400;
}

.cart-btn {
  position: relative;
  display: flex;
  align-items: center;
  gap: 0.5rem;
  color: var(--ink-secondary);
  background: none;
  border: none;
  font-size: 0.85rem;
  cursor: pointer;
  transition: all 0.3s ease;
}

.cart-badge {
  background: var(--accent-gold);
  color: var(--bg);
  border-radius: 50%;
  width: 20px;
  height: 20px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 0.7rem;
  font-weight: 500;
}

  const header = document.querySelector('.header-container');
  if(window.scrollY > 50){
    header.style.backdropFilter = 'blur(35px)';
    header.style.background = 'rgba(10, 10, 10, 0.98)';
