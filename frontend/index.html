<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NUVÉ | 2026 Archive</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;1,300&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0d0d0d; /* Deep Obsidian */
  --bg2: #1a1a1a; /* Dark Ash */
  --ink: #e5e5e5; /* Off-white text */
  --ink2: #888888;
  --accent: #d4bc8e; /* Muted Champagne Gold */
  --border: rgba(255, 255, 255, 0.05);
}

* { margin: 0; padding: 0; box-sizing: border-box; -webkit-font-smoothing: antialiased; }

body { 
  font-family: 'DM Mono', monospace; 
  background: var(--bg); 
  color: var(--ink); 
  overflow-x: hidden;
}

/* ── CINEMATIC NAVIGATION ── */
#site-header {
  position: fixed; top: 0; width: 100%; z-index: 1000;
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 4%; height: 100px; mix-blend-mode: difference;
}

.logo { 
  font-family: 'Cormorant Garamond', serif; font-size: 2rem; 
  letter-spacing: 0.6em; text-transform: uppercase; font-weight: 300;
}

.nav-links { display: flex; gap: 50px; }
.nav-btn {
  font-size: 0.6rem; letter-spacing: 0.4em; text-transform: uppercase;
  color: var(--ink); opacity: 0.5; border: none; background: none; transition: 0.5s;
}
.nav-btn:hover, .nav-btn.active { opacity: 1; letter-spacing: 0.5em; }

/* ── BRUTALIST HERO ── */
.hero {
  height: 100vh; display: flex; flex-direction: column;
  justify-content: center; padding: 0 8%; position: relative;
}
.hero h1 { 
  font-family: 'Cormorant Garamond', serif; font-size: clamp(4rem, 12vw, 10rem); 
  font-weight: 300; line-height: 0.8; letter-spacing: -0.05em;
  margin-left: -5px; clip-path: polygon(0 0, 100% 0, 100% 100%, 0% 100%);
}
.hero h1 em { font-style: italic; color: var(--accent); }

.hero-sub {
  margin-top: 40px; display: flex; justify-content: space-between; align-items: flex-end;
}
.hero-p { font-size: 0.75rem; color: var(--ink2); max-width: 300px; line-height: 2; letter-spacing: 0.05em; }

.hero-img-box {
  position: absolute; right: 8%; top: 50%; transform: translateY(-50%);
  width: 30vw; height: 60vh; background: var(--bg2);
  border: 1px solid var(--border); overflow: hidden;
  z-index: -1; animation: heroImageReveal 2s cubic-bezier(0.16, 1, 0.3, 1);
}

/* ── THE COLLECTION GRID ── */
.shop-wrap { padding: 150px 8%; }
.grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 100px 50px; }
.card { position: relative; transition: 0.8s cubic-bezier(0.16, 1, 0.3, 1); }

.card-img { 
  height: 600px; background: var(--bg2); display: flex; 
  align-items: center; justify-content: center; font-size: 6rem;
  border: 1px solid var(--border); filter: grayscale(100%);
  transition: 0.8s;
}
.card:hover .card-img { filter: grayscale(0%); transform: scale(0.98); border-color: var(--accent); }

.card-info { margin-top: 25px; display: flex; justify-content: space-between; }
.card-name { font-family: 'Cormorant Garamond', serif; font-size: 2rem; font-weight: 300; }
.card-price { font-size: 0.8rem; color: var(--accent); margin-top: 5px; }

.add-btn {
  margin-top: 20px; padding: 15px 0; width: 100%; border-top: 1px solid var(--border);
  font-size: 0.6rem; letter-spacing: 0.3em; text-transform: uppercase; color: var(--ink2);
}
.add-btn:hover { color: var(--ink); border-color: var(--ink); }

/* ── ADMIN/FORMS ── */
.page { display: none; }
.page.active { display: block; }
#admin { background: #000; min-height: 100vh; padding: 50px; }
.stat-card { border: 1px solid #222; padding: 30px; background: #0a0a0a; }
.stat-val { font-size: 3rem; color: var(--accent); }

/* ── ANIMATIONS ── */
@keyframes heroImageReveal {
  from { height: 0; opacity: 0; }
  to { height: 60vh; opacity: 1; }
}

@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
.page.active { animation: fadeIn 1.5s ease; }

::-webkit-scrollbar { width: 3px; }
::-webkit-scrollbar-thumb { background: var(--accent); }
</style>
</head>
<body>

<div id="site">
  <header id="site-header">
    <div class="logo" onclick="nav('home')">NUVÉ</div>
    <nav class="nav-links">
      <button class="nav-btn active" onclick="nav('home')">Archive</button>
      <button class="nav-btn" onclick="nav('shop')">Shop</button>
      <button class="nav-btn" onclick="nav('orders')">Orders</button>
    </nav>
    <div style="display:flex; gap:20px; align-items:center;">
      <span id="userChip" style="font-size:0.6rem; letter-spacing:0.2em;"></span>
      <button id="authBtn" class="nav-btn">Connect</button>
      <button class="nav-btn" onclick="nav('cart')" style="opacity:1;">Bag (<span id="cartBadge">0</span>)</button>
    </div>
  </header>

  <div id="home" class="page active">
    <div class="hero">
      <h1>Wear<br>The <em>Future</em></h1>
      <div class="hero-sub">
        <p class="hero-p">Minimalist structures. Modular thinking. The 2026 Archive is now open for public observation.</p>
        <button class="nav-btn" style="font-size:0.8rem; opacity:1;" onclick="nav('shop')">Enter Gallery —></button>
      </div>
      <div class="hero-img-box"></div>
    </div>
  </div>

  <div id="shop" class="page">
    <div class="shop-wrap">
      <div class="grid" id="prodGrid"></div>
    </div>
  </div>

  <div id="cart" class="page">
    <div class="shop-wrap" style="max-width:800px">
      <h2 style="font-family:'Cormorant Garamond'; font-size:5rem; margin-bottom:50px;">The Bag</h2>
      <div id="cartItems"></div>
      <div id="cartSum"></div>
    </div>
  </div>
</div>

<script>
const API = ''; 
let token = localStorage.getItem('nuve_token');
let me = JSON.parse(localStorage.getItem('nuve_me') || 'null');
let cart = JSON.parse(localStorage.getItem('nuve_cart') || '[]');
let allProducts = [];

async function api(path, opts={}) {
  const headers = { 'Content-Type':'application/json', ...(token ? { Authorization:`Bearer ${token}` } : {}) };
  const r = await fetch(`/api${path}`, { headers, ...opts, body: opts.body ? JSON.stringify(opts.body) : undefined });
  const contentType = r.headers.get("content-type");
  if (!contentType || !contentType.includes("application/json")) throw new Error("Connection lost.");
  const data = await r.json();
  if (!r.ok) throw new Error(data.error || r.statusText);
  return data;
}

function nav(id) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  if(id === 'shop') loadProducts();
}

async function loadProducts() {
  try {
    const data = await api('/products');
    allProducts = data.products;
    document.getElementById('prodGrid').innerHTML = allProducts.map(p => `
      <div class="card">
        <div class="card-img">${p.emoji || '🧥'}</div>
        <div class="card-info">
          <div class="card-name">${p.name}</div>
          <div class="card-price">${fmt(p.price)}</div>
        </div>
        <button class="add-btn" onclick="addCart('${p.id}','${p.name}',${p.price},'${p.emoji}')">Add to Bag</button>
      </div>
    `).join('');
  } catch(e) { console.error(e); }
}

function fmt(n) { return '$' + parseFloat(n).toFixed(2); }

// INIT
if(me && me.role === 'admin') {
    document.getElementById('site').style.display = 'none';
} else {
    loadProducts();
}
</script>
</body>
</html>
