databases:
  - name: nuve-db
    databaseName: nuve_store
    user: nuve
    plan: free

services:
  - type: web
    name: nuve-store
    plan: free
    runtime: node
    buildCommand: npm install && npm run db:migrate && npm run db:seed
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: nuve-db
          property: connectionString
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: ADMIN_EMAIL
        value: admin@nuve.store
      - key: ADMIN_PASSWORD
        sync: false
